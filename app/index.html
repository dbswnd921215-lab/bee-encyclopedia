<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e8a317">
<title>양봉 백과사전</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🐝 양봉 백과사전</h1>
  <div class="searchbar">
    <input id="q" type="search" placeholder="예: 봄벌 키우는 방법, 응애 방제, 월동" autocomplete="off" enterkeyhint="search">
    <button id="clear" aria-label="지우기" hidden>✕</button>
  </div>
  <p class="hint" id="hint">양봉 자료 10권 · 약 2,300쪽에서 찾아봅니다</p>
</header>

<main>
  <section id="entries"></section>
  <section id="results"></section>
  <section id="browse"></section>
</main>

<!-- 원본 페이지 뷰어 -->
<div id="viewer" class="viewer" hidden>
  <div class="viewer-bar">
    <span id="viewer-title"></span>
    <button id="viewer-close" aria-label="닫기">✕</button>
  </div>
  <div class="viewer-body"><img id="viewer-img" alt="원본 페이지"></div>
  <div class="viewer-nav">
    <button id="prev">◀ 이전</button>
    <span id="page-label"></span>
    <button id="next">다음 ▶</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
